name: Build & Push Multi Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}

jobs:
  detect-and-build:
    name: Build Changed Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - dir: python/3.13
            name: python-3.13
          - dir: node/20
            name: node-20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 生成时间戳标签 YYYYMMDDHHmmss
      - name: Generate timestamp tag
        id: timestamp
        run: echo "TIMESTAMP=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      # 检测变更文件/目录
      - name: Get changed files & directories
        id: changed_files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            python/**
            node/**
            rust/**
            **/Dockerfile
            **/*.txt
            **/*.sh

      # 判断当前目录是否变更
      - name: Check if current image dir changed
        id: skip_check
        run: |
          CHANGED_DIRS="${{ steps.changed_files.outputs.all_changed_files }}"
          CURRENT_DIR="${{ matrix.image.dir }}"
          if echo "$CHANGED_DIRS" | grep -q "$CURRENT_DIR"; then
            echo "changed=true" >> $GITHUB_ENV
          else
            echo "changed=false" >> $GITHUB_ENV
          fi

      - name: Skip build (no changes)
        if: env.changed == 'false'
        run: echo "Directory ${{ matrix.image.dir }} no changes, skip."

      # 登录 Docker Hub
      - name: Login to Docker Hub
        if: env.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        if: env.changed == 'true'
        uses: docker/setup-buildx-action@v3

      # 构建推送：时间戳标签 + latest 双标签
      - name: Build & push image
        if: env.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.image.dir }}
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USER }}/${{ matrix.image.name }}:${{ env.TIMESTAMP }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USER }}/${{ matrix.image.name }}:latest
          cache-from: type=registry,ref=${{ env.DOCKER_USER }}/${{ matrix.image.name }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USER }}/${{ matrix.image.name }}:buildcache,mode=max