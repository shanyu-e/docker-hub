name: Build & Push Multi Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}

jobs:
  detect-and-build:
    name: Build Changed Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - dir: python/3.13
            name: python-3.13
          - dir: node/20
            name: node-20
          - dir: remark-pro/backend
            name: remark42-backend-pro-base
          - dir: remark-pro/frontend
            name: remark42-frontend-pro-base
          - dir: remark/backend
            name: remark-backend
          - dir: remark/frontend
            name: remark-frontend
          - dir: webhook
            name: webhook

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # 生成时间戳标签 YYYYMMDDHHmmss
      - name: Generate timestamp tag
        id: timestamp
        run: echo "TIMESTAMP=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      # 判断当前目录是否变更（直接用 git diff，不依赖第三方 action）
      - name: Check if current image dir changed
        id: skip_check
        run: |
          CURRENT_DIR="${{ matrix.image.dir }}"
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          echo "Comparing $BASE_SHA..$HEAD_SHA"

          # 如果 before 是空 SHA（新分支/首次推送），认为全部变更
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=true
          else
            # shallow clone 只有最新一个 commit，需要 fetch base SHA
            git fetch --depth=1 origin "$BASE_SHA"
            if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -q "^${CURRENT_DIR}/"; then
              CHANGED=true
            else
              CHANGED=false
            fi
          fi

          echo "changed=$CHANGED" >> $GITHUB_ENV
          echo "Result: ${{ matrix.image.name }} changed=$CHANGED"

      - name: Skip build (no changes)
        if: env.changed == 'false'
        run: echo "Directory ${{ matrix.image.dir }} no changes, skip."

      # 登录 Docker Hub
      - name: Login to Docker Hub
        if: env.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        if: env.changed == 'true'
        uses: docker/setup-buildx-action@v3

      # 构建推送：时间戳标签 + latest 双标签
      - name: Build & push image
        if: env.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.image.dir }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USER }}/${{ matrix.image.name }}:${{ env.TIMESTAMP }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USER }}/${{ matrix.image.name }}:latest
          cache-from: type=registry,ref=${{ env.DOCKER_USER }}/${{ matrix.image.name }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USER }}/${{ matrix.image.name }}:buildcache,mode=max

      - name: Notify host to sync image
        if: env.changed == 'true' && (matrix.image.name == 'remark-backend' || matrix.image.name == 'remark-frontend')
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          echo "Waiting 60s for image to be available on registry..."
          sleep 60
          curl -sf -X POST "${WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${WEBHOOK_SECRET}" \
            -d "{\"tag\":\"${{ env.TIMESTAMP }}\",\"image\":\"${{ matrix.image.name }}\"}"